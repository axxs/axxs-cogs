# Tasmanian gig listings — bundled with the giglist cog.
#
# Each place fans out across (usually) three sources and dedupes via the
# aggregator. Tasguide's `/category/music` is Tasmania-wide (it's the only
# music-only filter Tasguide exposes — the regional /events/<region> pages
# mix categories), Humanitix narrows by city slug (most Tasmanian towns
# have their own `au--tas--<city>` page), and Ticketmaster's dmaId 707 is
# all of Tasmania. So the geographic narrowing in practice comes from
# Humanitix; Tasguide + Ticketmaster contribute statewide context.
#
# Burnie is the lone exception: Humanitix has no `au--tas--burnie` page,
# so that place ships with only the two statewide sources.

places:
  # --- Greater Hobart ----------------------------------------------------
  - key: hobart
    display_name: Hobart
    aliases: [hbt]
    sources:
      - kind: tasguide
        spec: { path: category/music }
        label: "Tasmania music"
      - kind: humanitix
        spec: { slug: au--tas--hobart, category: music }
        label: "Hobart"
      - kind: ticketmaster
        spec: { dmaId: "707" }
        label: "Tasmania (TM)"

  - key: north hobart
    display_name: North Hobart
    aliases: [north-hobart, northhobart, nhobart]
