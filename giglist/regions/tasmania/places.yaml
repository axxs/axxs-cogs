# Tasmanian gig listings — bundled with the giglist cog.
#
# Each source has a `scope`:
#   - `local`     — geographically narrowed to the place (Humanitix city slug,
#                   Ticketmaster `city=<city>`). These should contain only
#                   gigs actually in/near the place.
#   - `statewide` — broader sources that can't be city-narrowed (Tasguide's
#                   `/category/music` is Tasmania-wide; TM `dmaId=707` is the
#                   whole Tasmania DMA). They provide context.
#
# When every `local` source returns zero events but `statewide` sources still
# have something, the renderer prefixes a clear "No <Place>-specific gigs;
# showing wider listings below" note so the title isn't misleading.
#
# Burnie is the lone exception in this pack: Humanitix has no
# `au--tas--burnie` page (404), so it ships with only the statewide pair.

places:
  # --- Greater Hobart ----------------------------------------------------
  - key: hobart
    display_name: Hobart
    aliases: [hbt]
    sources:
      - kind: tasguide
        spec: { path: category/music }
        scope: statewide
        label: "Tasmania music"
      - kind: humanitix
        spec: { slug: au--tas--hobart, category: music }
        scope: local
        label: "Hobart"
      - kind: ticketmaster
        spec: { city: Hobart }
        scope: local
        label: "Hobart (TM)"

  # Hobart suburbs have their own Humanitix page (great), but TM only tags
  # at city-level so we keep TM's dmaId=707 marked statewide here.
  - key: north hobart
    display_name: North Hobart
    aliases: [north-hobart, northhobart, nhobart]
    sources:
      - kind: tasguide
        spec: { path: category/music }
        scope: statewide
      - kind: humanitix
        spec: { slug: au--tas--north-hobart, category: music }
        scope: local
      - kind: ticketmaster
        spec: { dmaId: "707" }
        scope: statewide

